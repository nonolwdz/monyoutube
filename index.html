<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TubePure V2 - Anti-Blocage</title>
    <style>
        :root { --main-red: #ff4747; --bg-dark: #0f0f0f; --card-bg: #1e1e1e; }
        body { font-family: sans-serif; background-color: var(--bg-dark); color: white; margin: 0; padding: 15px; text-align: center; }
        .container { width: 100%; max-width: 900px; margin: auto; }
        h1 { color: var(--main-red); font-size: 1.8rem; }
        
        .search-area { display: flex; gap: 8px; margin-bottom: 15px; }
        input { flex: 1; padding: 12px; border-radius: 8px; border: none; background: #2a2a2a; color: white; }
        button { padding: 12px; background: var(--main-red); border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; }
        
        .server-status { font-size: 0.8rem; margin-bottom: 15px; color: #aaa; }
        .server-btn { background: #444; font-size: 0.7rem; padding: 5px 10px; margin-left: 5px; }

        #video-view { display: none; margin-top: 10px; }
        .player-wrapper { position: relative; padding-bottom: 56.25%; height: 0; border-radius: 12px; overflow: hidden; background: black; }
        .player-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        .results-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; margin-top: 20px; }
        .video-card { background: var(--card-bg); border-radius: 10px; overflow: hidden; cursor: pointer; }
        .video-card img { width: 100%; aspect-ratio: 16/9; object-fit: cover; }
        .video-card h3 { font-size: 0.8rem; padding: 8px; margin: 0; height: 2.5rem; overflow: hidden; }
    </style>
</head>
<body>

<div class="container">
    <h1>TubePure</h1>
    
    <div class="server-status">
        Serveur actuel : <span id="current-server-name">Chargement...</span>
        <button class="server-btn" onclick="switchInstance()">Changer de serveur</button>
    </div>

    <div class="search-area">
        <input type="text" id="query" placeholder="Chercher une vidéo...">
        <button onclick="handleAction()">OK</button>
    </div>

    <div id="video-view">
        <div class="player-wrapper">
            <iframe id="main-player" src="" allowfullscreen></iframe>
        </div>
        <button onclick="closePlayer()" style="margin-top:10px; width:100%; background:#333;">Fermer la vidéo</button>
    </div>

    <div id="results" class="results-grid"></div>
</div>

<script>
    // Liste des serveurs qui fonctionnent le mieux en 2026
    const instances = [
        "https://invidious.projectsegfau.lt",
        "https://invidious.lunar.icu",
        "https://iv.melmac.space",
        "https://inv.tux.rs",
        "https://invidious.nerdvpn.de"
    ];

    let currentIdx = 0;

    function updateServerDisplay() {
        document.getElementById('current-server-name').innerText = instances[currentIdx].replace('https://', '');
    }

    function switchInstance() {
        currentIdx = (currentIdx + 1) % instances.length;
        updateServerDisplay();
        alert("Serveur changé ! Réessayez votre recherche.");
    }

    async function handleAction() {
        const input = document.getElementById('query').value;
        const resultsDiv = document.getElementById('results');
        resultsDiv.innerHTML = "Recherche en cours sur " + instances[currentIdx] + "...";

        try {
            const response = await fetch(`${instances[currentIdx]}/api/v1/search?q=${encodeURIComponent(input)}`);
            const data = await response.json();
            resultsDiv.innerHTML = "";
            
            data.forEach(video => {
                if (video.type === "video") {
                    const card = document.createElement('div');
                    card.className = 'video-card';
                    card.onclick = () => launchVideo(video.videoId);
                    card.innerHTML = `<img src="${instances[currentIdx]}/vi/${video.videoId}/mqdefault.jpg"><h3>${video.title}</h3>`;
                    resultsDiv.appendChild(card);
                }
            });
        } catch (error) {
            resultsDiv.innerHTML = "❌ Ce serveur est bloqué ou saturé. Cliquez sur 'Changer de serveur' en haut.";
        }
    }

    function launchVideo(id) {
        const player = document.getElementById('main-player');
        player.src = `${instances[currentIdx]}/embed/${id}?autoplay=1`;
        document.getElementById('video-view').style.display = "block";
        window.scrollTo(0,0);
    }

    function closePlayer() {
        document.getElementById('main-player').src = "";
        document.getElementById('video-view').style.display = "none";
    }

    updateServerDisplay();
</script>

</body>
</html>    
    <div class="search-area">
        <input type="text" id="query" placeholder="Chercher une vidéo ou coller un lien YouTube...">
        <button onclick="handleAction()">Rechercher</button>
    </div>

    <div id="video-view">
        <div class="player-wrapper">
            <iframe id="main-player" src="" allowfullscreen></iframe>
        </div>
        <button onclick="closePlayer()" style="margin-top:10px; background:#444;">Retour à la recherche</button>
    </div>

    <div id="loader" class="loader">Recherche en cours...</div>
    <div id="results" class="results-grid"></div>
</div>

<script>
    const INSTANCE = "invidious.nerdvpn.de"; // Tu peux changer pour une autre instance Invidious

    async function handleAction() {
        const input = document.getElementById('query').value;
        if (!input) return;

        // Si c'est un lien direct, on le lance
        if (input.includes("youtube.com") || input.includes("youtu.be")) {
            launchVideo(extractId(input));
        } else {
            // Sinon, on fait une recherche
            searchVideos(input);
        }
    }

    function extractId(url) {
        if (url.includes("v=")) return url.split("v=")[1].split("&")[0];
        if (url.includes("youtu.be/")) return url.split("youtu.be/")[1].split("?")[0];
        return "";
    }

    async function searchVideos(query) {
        const resultsDiv = document.getElementById('results');
        const loader = document.getElementById('loader');
        
        resultsDiv.innerHTML = "";
        loader.style.display = "block";
        document.getElementById('video-view').style.display = "none";

        try {
            const response = await fetch(`${INSTANCE}/api/v1/search?q=${encodeURIComponent(query)}`);
            const data = await response.json();
            
            loader.style.display = "none";
            
            data.forEach(video => {
                if (video.type === "video") {
                    const card = document.createElement('div');
                    card.className = 'video-card';
                    card.onclick = () => launchVideo(video.videoId);
                    card.innerHTML = `
                        <img src="${INSTANCE}/vi/${video.videoId}/mqdefault.jpg">
                        <h3>${video.title}</h3>
                    `;
                    resultsDiv.appendChild(card);
                }
            });
        } catch (error) {
            alert("Erreur de connexion à l'instance. Réessayez plus tard.");
            loader.style.display = "none";
        }
    }

    function launchVideo(id) {
        const player = document.getElementById('main-player');
        const view = document.getElementById('video-view');
        player.src = `${INSTANCE}/embed/${id}?autoplay=1`;
        view.style.display = "block";
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function closePlayer() {
        document.getElementById('main-player').src = "";
        document.getElementById('video-view').style.display = "none";
    }
</script>

</body>
  </html>
