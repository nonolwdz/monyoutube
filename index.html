<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TubePure - Recherche Sans Pub</title>
    <style>
        :root { --main-red: #ff4747; --bg-dark: #0f0f0f; --card-bg: #1e1e1e; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-dark); color: white; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 1000px; }
        h1 { color: var(--main-red); text-align: center; font-size: 2.5rem; margin-bottom: 10px; }
        
        .search-area { display: flex; gap: 10px; margin-bottom: 30px; }
        input { flex: 1; padding: 15px; border-radius: 8px; border: none; background: #2a2a2a; color: white; font-size: 1rem; }
        button { padding: 15px 25px; background: var(--main-red); border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { background: #cc3636; transform: translateY(-2px); }

        /* Lecteur principal */
        #video-view { display: none; margin-bottom: 30px; }
        .player-wrapper { position: relative; padding-bottom: 56.25%; height: 0; border-radius: 12px; overflow: hidden; background: black; }
        .player-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        /* Grille de recherche */
        .results-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; }
        .video-card { background: var(--card-bg); border-radius: 10px; overflow: hidden; cursor: pointer; transition: 0.3s; }
        .video-card:hover { transform: scale(1.03); background: #2a2a2a; }
        .video-card img { width: 100%; aspect-ratio: 16/9; object-fit: cover; }
        .video-card h3 { font-size: 0.9rem; padding: 10px; margin: 0; line-height: 1.3; height: 2.6rem; overflow: hidden; }
        
        .loader { display: none; color: gray; margin: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h1>TubePure</h1>
    
    <div class="search-area">
        <input type="text" id="query" placeholder="Chercher une vidéo ou coller un lien YouTube...">
        <button onclick="handleAction()">Rechercher</button>
    </div>

    <div id="video-view">
        <div class="player-wrapper">
            <iframe id="main-player" src="" allowfullscreen></iframe>
        </div>
        <button onclick="closePlayer()" style="margin-top:10px; background:#444;">Retour à la recherche</button>
    </div>

    <div id="loader" class="loader">Recherche en cours...</div>
    <div id="results" class="results-grid"></div>
</div>

<script>
    const INSTANCE = "https://invidious.flokinet.to"; // Tu peux changer pour une autre instance Invidious

    async function handleAction() {
        const input = document.getElementById('query').value;
        if (!input) return;

        // Si c'est un lien direct, on le lance
        if (input.includes("youtube.com") || input.includes("youtu.be")) {
            launchVideo(extractId(input));
        } else {
            // Sinon, on fait une recherche
            searchVideos(input);
        }
    }

    function extractId(url) {
        if (url.includes("v=")) return url.split("v=")[1].split("&")[0];
        if (url.includes("youtu.be/")) return url.split("youtu.be/")[1].split("?")[0];
        return "";
    }

    async function searchVideos(query) {
        const resultsDiv = document.getElementById('results');
        const loader = document.getElementById('loader');
        
        resultsDiv.innerHTML = "";
        loader.style.display = "block";
        document.getElementById('video-view').style.display = "none";

        try {
            const response = await fetch(`${INSTANCE}/api/v1/search?q=${encodeURIComponent(query)}`);
            const data = await response.json();
            
            loader.style.display = "none";
            
            data.forEach(video => {
                if (video.type === "video") {
                    const card = document.createElement('div');
                    card.className = 'video-card';
                    card.onclick = () => launchVideo(video.videoId);
                    card.innerHTML = `
                        <img src="${INSTANCE}/vi/${video.videoId}/mqdefault.jpg">
                        <h3>${video.title}</h3>
                    `;
                    resultsDiv.appendChild(card);
                }
            });
        } catch (error) {
            alert("Erreur de connexion à l'instance. Réessayez plus tard.");
            loader.style.display = "none";
        }
    }

    function launchVideo(id) {
        const player = document.getElementById('main-player');
        const view = document.getElementById('video-view');
        player.src = `${INSTANCE}/embed/${id}?autoplay=1`;
        view.style.display = "block";
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function closePlayer() {
        document.getElementById('main-player').src = "";
        document.getElementById('video-view').style.display = "none";
    }
</script>

</body>
  </html>
