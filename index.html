<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TubePure V3 - 100% Fonctionnel</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; padding: 20px; }
        .box { background: #1e1e1e; padding: 20px; border-radius: 15px; max-width: 500px; margin: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { color: #ff4747; }
        input { width: 90%; padding: 15px; margin: 10px 0; border-radius: 8px; border: none; background: #333; color: white; }
        button { width: 95%; padding: 15px; background: #ff4747; border: none; color: white; font-weight: bold; border-radius: 8px; cursor: pointer; margin-top: 10px; }
        .info { font-size: 0.8rem; color: #888; margin-top: 20px; line-height: 1.5; }
        select { background: #333; color: white; padding: 5px; border-radius: 5px; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="box">
        <h1>TubePure</h1>
        <p>Regarde YouTube sans pubs</p>

        <input type="text" id="vidUrl" placeholder="Colle un lien YouTube ici...">
        <button onclick="playVideo()">LIRE SANS PUB</button>

        <hr style="margin: 20px; border: 0.5px solid #333;">

        <input type="text" id="searchQuery" placeholder="Ou tape une recherche...">
        <button onclick="searchVideo()" style="background: #444;">RECHERCHER</button>

        <div class="info">
            Serveur : 
            <select id="serverSelect">
                <option value="https://invidious.projectsegfau.lt">Project Segfault</option>
                <option value="https://yewtu.be">Yewtu.be</option>
                <option value="https://inv.tux.rs">Tux.rs</option>
                <option value="https://iv.melmac.space">Melmac</option>
            </select>
            <br><br>
            Note : La recherche s'ouvrira dans un nouvel onglet pour éviter les blocages.
        </div>
    </div>

<script>
    function playVideo() {
        const url = document.getElementById('vidUrl').value;
        const server = document.getElementById('serverSelect').value;
        let id = "";

        if (url.includes("v=")) id = url.split("v=")[1].split("&")[0];
        else if (url.includes("youtu.be/")) id = url.split("youtu.be/")[1].split("?")[0];
        else if (url.includes("shorts/")) id = url.split("shorts/")[1].split("?")[0];

        if (id) {
            window.location.href = server + "/watch?v=" + id;
        } else {
            alert("Lien non reconnu. Copie bien l'adresse entière.");
        }
    }

    function searchVideo() {
        const q = document.getElementById('searchQuery').value;
        const server = document.getElementById('serverSelect').value;
        if (q) {
            // On ouvre directement la recherche sur le serveur Invidious
            window.open(server + "/search?q=" + encodeURIComponent(q), "_blank");
        }
    }
</script>

</body>
</html>        <button class="server-btn" onclick="switchInstance()">Changer de serveur</button>
    </div>

    <div class="search-area">
        <input type="text" id="query" placeholder="Chercher une vidéo...">
        <button onclick="handleAction()">OK</button>
    </div>

    <div id="video-view">
        <div class="player-wrapper">
            <iframe id="main-player" src="" allowfullscreen></iframe>
        </div>
        <button onclick="closePlayer()" style="margin-top:10px; width:100%; background:#333;">Fermer la vidéo</button>
    </div>

    <div id="results" class="results-grid"></div>
</div>

<script>
    // Liste des serveurs qui fonctionnent le mieux en 2026
    const instances = [
        "https://invidious.projectsegfau.lt",
        "https://invidious.lunar.icu",
        "https://iv.melmac.space",
        "https://inv.tux.rs",
        "https://invidious.nerdvpn.de"
    ];

    let currentIdx = 0;

    function updateServerDisplay() {
        document.getElementById('current-server-name').innerText = instances[currentIdx].replace('https://', '');
    }

    function switchInstance() {
        currentIdx = (currentIdx + 1) % instances.length;
        updateServerDisplay();
        alert("Serveur changé ! Réessayez votre recherche.");
    }

    async function handleAction() {
        const input = document.getElementById('query').value;
        const resultsDiv = document.getElementById('results');
        resultsDiv.innerHTML = "Recherche en cours sur " + instances[currentIdx] + "...";

        try {
            const response = await fetch(`${instances[currentIdx]}/api/v1/search?q=${encodeURIComponent(input)}`);
            const data = await response.json();
            resultsDiv.innerHTML = "";
            
            data.forEach(video => {
                if (video.type === "video") {
                    const card = document.createElement('div');
                    card.className = 'video-card';
                    card.onclick = () => launchVideo(video.videoId);
                    card.innerHTML = `<img src="${instances[currentIdx]}/vi/${video.videoId}/mqdefault.jpg"><h3>${video.title}</h3>`;
                    resultsDiv.appendChild(card);
                }
            });
        } catch (error) {
            resultsDiv.innerHTML = "❌ Ce serveur est bloqué ou saturé. Cliquez sur 'Changer de serveur' en haut.";
        }
    }

    function launchVideo(id) {
        const player = document.getElementById('main-player');
        player.src = `${instances[currentIdx]}/embed/${id}?autoplay=1`;
        document.getElementById('video-view').style.display = "block";
        window.scrollTo(0,0);
    }

    function closePlayer() {
        document.getElementById('main-player').src = "";
        document.getElementById('video-view').style.display = "none";
    }

    updateServerDisplay();
</script>

</body>
</html>    
    <div class="search-area">
        <input type="text" id="query" placeholder="Chercher une vidéo ou coller un lien YouTube...">
        <button onclick="handleAction()">Rechercher</button>
    </div>

    <div id="video-view">
        <div class="player-wrapper">
            <iframe id="main-player" src="" allowfullscreen></iframe>
        </div>
        <button onclick="closePlayer()" style="margin-top:10px; background:#444;">Retour à la recherche</button>
    </div>

    <div id="loader" class="loader">Recherche en cours...</div>
    <div id="results" class="results-grid"></div>
</div>

<script>
    const INSTANCE = "invidious.nerdvpn.de"; // Tu peux changer pour une autre instance Invidious

    async function handleAction() {
        const input = document.getElementById('query').value;
        if (!input) return;

        // Si c'est un lien direct, on le lance
        if (input.includes("youtube.com") || input.includes("youtu.be")) {
            launchVideo(extractId(input));
        } else {
            // Sinon, on fait une recherche
            searchVideos(input);
        }
    }

    function extractId(url) {
        if (url.includes("v=")) return url.split("v=")[1].split("&")[0];
        if (url.includes("youtu.be/")) return url.split("youtu.be/")[1].split("?")[0];
        return "";
    }

    async function searchVideos(query) {
        const resultsDiv = document.getElementById('results');
        const loader = document.getElementById('loader');
        
        resultsDiv.innerHTML = "";
        loader.style.display = "block";
        document.getElementById('video-view').style.display = "none";

        try {
            const response = await fetch(`${INSTANCE}/api/v1/search?q=${encodeURIComponent(query)}`);
            const data = await response.json();
            
            loader.style.display = "none";
            
            data.forEach(video => {
                if (video.type === "video") {
                    const card = document.createElement('div');
                    card.className = 'video-card';
                    card.onclick = () => launchVideo(video.videoId);
                    card.innerHTML = `
                        <img src="${INSTANCE}/vi/${video.videoId}/mqdefault.jpg">
                        <h3>${video.title}</h3>
                    `;
                    resultsDiv.appendChild(card);
                }
            });
        } catch (error) {
            alert("Erreur de connexion à l'instance. Réessayez plus tard.");
            loader.style.display = "none";
        }
    }

    function launchVideo(id) {
        const player = document.getElementById('main-player');
        const view = document.getElementById('video-view');
        player.src = `${INSTANCE}/embed/${id}?autoplay=1`;
        view.style.display = "block";
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function closePlayer() {
        document.getElementById('main-player').src = "";
        document.getElementById('video-view').style.display = "none";
    }
</script>

</body>
  </html>
